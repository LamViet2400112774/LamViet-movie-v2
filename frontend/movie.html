<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Chi tiết phim - MovieSite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Segoe UI', sans-serif; }
  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="goHome()">
        <span>🎬</span> MovieSite
      </div>

      <button class="menu-toggle" onclick="toggleMenu()">☰</button>

      <nav class="menu" id="navMenu">
        <a href="index.html?type=phim-le">Phim lẻ</a>
        <a href="index.html?type=phim-bo">Phim bộ</a>
        <a href="index.html?type=tv-shows">TV Shows</a>
        <a href="index.html?type=hoat-hinh">Hoạt hình</a>
        <a href="index.html?type=phim-vietsub">Vietsub</a>
        <a href="index.html?type=phim-thuyet-minh">Thuyết minh</a>
        <a href="index.html?type=phim-long-tieng">Lồng tiếng</a>
      </nav>

      <div class="search-box">
        <input id="searchInput" placeholder="Tìm kiếm phim..." />
        <button onclick="searchMovie()">🔍</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="content">
      <!-- <button class="back" onclick="goHome()">
        <span>←</span> Quay lại
      </button> -->

      <div id="detail"></div>

      <h3>📺 Danh sách tập</h3>
      <div id="episodes"></div>
      <div id="currentEpisode" style="margin: 15px 0; padding: 12px 20px; background: rgba(229, 9, 20, 0.1); border-left: 3px solid var(--primary); border-radius: 6px; color: #fff; font-weight: 500;">
        <span style="color: var(--primary);">▶</span> Đang xem: <span id="episodeInfo">Chọn tập để xem</span>
      </div>
      <div class="episode-nav">
        <button id="prevEpisode">◀ Tập trước</button>
        <span id="episodeStatus">0/0</span>
        <button id="nextEpisode">Tập sau ▶</button>
      </div>

      <div id="player"></div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 MovieSite - Xem phim online miễn phí</p>
  </footer>

  <script src="app.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('navMenu').classList.toggle('active');
    }
  </script>
</body>
</html>
